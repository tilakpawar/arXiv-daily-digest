  <path d="M 58 108 L 182 108 L 168 122 L 72 122 Z" fill="#ffffff" opacity="0.14"/>

  <!-- distilled drop -->
  <circle cx="120" cy="196" r="5" fill="#7fdb9e"/>

  <!-- one clean digest out -->
