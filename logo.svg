    <linearGradient id="digest" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1e2630"/>
      <stop offset="100%" stop-color="#171c24"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="240" height="240" rx="52" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="237" height="237" rx="50.5"
        fill="none" stroke="#2a2f38" stroke-width="2"/>

  <!-- many papers in (broad scope) -->
