  <g stroke="#7fdb9e" stroke-width="2.6" stroke-linecap="round">
    <line x1="90" y1="206" x2="150" y2="206"/>
    <line x1="90" y1="213" x2="134" y2="213"/>
  </g>

  <!-- sparkle: the AI summary -->
  <path d="M 178 150 l 3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3 z" fill="#ffd27c"/>
  <circle cx="166" cy="170" r="2.2" fill="#ffd27c" opacity="0.8"/>
