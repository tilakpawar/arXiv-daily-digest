    <rect x="50" y="34" width="52" height="62" rx="6" fill="#262c36" stroke="#39414d" stroke-width="1.5"/>
    <g stroke="#5b6675" stroke-width="2.4" stroke-linecap="round">
      <line x1="58" y1="48" x2="92" y2="48"/>
      <line x1="58" y1="58" x2="92" y2="58"/>
      <line x1="58" y1="68" x2="84" y2="68"/>
    </g>
  </g>
  <g transform="rotate(13 164 64)">
    <rect x="138" y="34" width="52" height="62" rx="6" fill="#262c36" stroke="#39414d" stroke-width="1.5"/>
    <g stroke="#5b6675" stroke-width="2.4" stroke-linecap="round">
      <line x1="146" y1="48" x2="180" y2="48"/>
      <line x1="146" y1="58" x2="180" y2="58"/>
